name: Setup console2svg
description: Installs console2svg by downloading a release binary or building from source (develop), then adds it to PATH

inputs:
  version:
    description: 'Version to install (e.g. 0.4.3, latest, develop). Defaults to the latest release.'
    required: false
    default: 'latest'

runs:
  using: composite
  steps:
    - name: Setup .NET SDK (develop)
      if: ${{ inputs.version == 'develop' }}
      uses: actions/setup-dotnet@v4

    - name: Build and install console2svg from source (develop)
      if: ${{ inputs.version == 'develop' }}
      shell: bash
      run: |
        case "${{ runner.os }}/${{ runner.arch }}" in
          Linux/X64)     RID="linux-x64"   ; EXT="" ;;
          Linux/ARM64)   RID="linux-arm64" ; EXT="" ;;
          Windows/X64)   RID="win-x64"     ; EXT=".exe" ;;
          Windows/ARM64) RID="win-arm64"   ; EXT=".exe" ;;
          macOS/X64)     RID="osx-x64"     ; EXT="" ;;
          macOS/ARM64)   RID="osx-arm64"   ; EXT="" ;;
          *)
            echo "Unsupported OS/arch: ${{ runner.os }}/${{ runner.arch }}"
            exit 1
            ;;
        esac

        INSTALL_DIR="${{ runner.tool_cache }}/console2svg/develop/${{ runner.arch }}"
        mkdir -p "$INSTALL_DIR"

        export NBGV_GitEngine=Disabled
        dotnet publish "${{ github.action_path }}/src/ConsoleToSvg/ConsoleToSvg.csproj" \
          -c Release \
          -r "$RID" \
          -p:PublishAot=true \
          -p:SelfContained=true \
          -o "$INSTALL_DIR"

        if [ -f "$INSTALL_DIR/ConsoleToSvg${EXT}" ]; then
          cp "$INSTALL_DIR/ConsoleToSvg${EXT}" "$INSTALL_DIR/console2svg${EXT}"
        elif [ -f "$INSTALL_DIR/console2svg${EXT}" ]; then
          :
        else
          echo "Published binary not found in $INSTALL_DIR"
          ls -la "$INSTALL_DIR"
          exit 1
        fi

        [ -z "${EXT}" ] && chmod +x "$INSTALL_DIR/console2svg"
        echo "$INSTALL_DIR" >> "$GITHUB_PATH"

    - name: Download and install console2svg
      if: ${{ inputs.version != 'develop' }}
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"

        case "${{ runner.os }}/${{ runner.arch }}" in
          Linux/X64)     RID="linux-x64"   ; EXT="" ;;
          Linux/ARM64)   RID="linux-arm64" ; EXT="" ;;
          Windows/X64)   RID="win-x64"     ; EXT=".exe" ;;
          Windows/ARM64) RID="win-arm64"   ; EXT=".exe" ;;
          macOS/X64)     RID="osx-x64"     ; EXT="" ;;
          macOS/ARM64)   RID="osx-arm64"   ; EXT="" ;;
          *)
            echo "Unsupported OS/arch: ${{ runner.os }}/${{ runner.arch }}"
            exit 1
            ;;
        esac

        FILE="console2svg-${RID}${EXT}"
        if [ "$VERSION" = "latest" ]; then
          URL="https://github.com/arika0093/console2svg/releases/latest/download/${FILE}"
        else
          URL="https://github.com/arika0093/console2svg/releases/download/v${VERSION}/${FILE}"
        fi

        INSTALL_DIR="${{ runner.tool_cache }}/console2svg/${VERSION}/${{ runner.arch }}"
        mkdir -p "$INSTALL_DIR"

        echo "Downloading ${URL} ..."
        curl -fsSL -L -o "${INSTALL_DIR}/console2svg${EXT}" "${URL}"
        [ -z "${EXT}" ] && chmod +x "${INSTALL_DIR}/console2svg"

        echo "${INSTALL_DIR}" >> "$GITHUB_PATH"
